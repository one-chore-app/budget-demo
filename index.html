  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lder-val=\"{{ false }}\">\n                  <button onclick=\"{{ modal.onDelete }}\" style=\"background: transparent; color: rgba(0,0,0,0.5); border: 1px solid rgba(0,0,0,0.25); border-radius: 999px; height: 28px; padding: 0 16px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; line-height: 28px;\">Delete<\u002Fbutton>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ scopeDialogOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position: absolute; inset: 0; background: rgba(0,0,0,0.55); z-index: 20; display: flex; align-items: center; justify-content: center; padding: 32px; box-sizing: border-box;\">\n            <div style=\"background: rgb(255,255,255); border-radius: 20px; padding: 24px; width: 100%; box-sizing: border-box;\">\n              <div style=\"font-size: 17px; font-weight: 700; color: rgb(0,0,0); margin-bottom: 8px;\">Apply this change to:<\u002Fdiv>\n              <div style=\"font-size: 14px; color: rgba(0,0,0,0.55); margin-bottom: 18px;\">This is a recurring item. Past months are never affected.<\u002Fdiv>\n              <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n                <button onclick=\"{{ onScopeOnly }}\" style=\"background: rgb(48,39,34); color: rgb(255,255,255); border: none; border-radius: 14px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;\">This month only<\u002Fbutton>\n                <button onclick=\"{{ onScopeFuture }}\" style=\"background: rgba(0,0,0,0.06); color: rgb(0,0,0); border: none; border-radius: 14px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;\">This and future months<\u002Fbutton>\n                <span onclick=\"{{ onScopeCancel }}\" style=\"text-align: center; color: rgba(0,0,0,0.45); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px;\">Cancel<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ confirmDialogOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position: absolute; inset: 0; background: rgba(0,0,0,0.55); z-index: 20; display: flex; align-items: center; justify-content: center; padding: 32px; box-sizing: border-box;\">\n            <div style=\"background: rgb(255,255,255); border-radius: 20px; padding: 24px; width: 100%; box-sizing: border-box;\">\n              <div style=\"font-size: 17px; font-weight: 700; color: rgb(0,0,0); margin-bottom: 8px;\">Delete this item?<\u002Fdiv>\n              <div style=\"font-size: 14px; color: rgba(0,0,0,0.55); margin-bottom: 18px;\">This is a recurring item. Past months are never affected.<\u002Fdiv>\n              <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n                <button onclick=\"{{ onDeleteOnly }}\" style=\"background: rgb(48,39,34); color: rgb(255,255,255); border: none; border-radius: 14px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;\">Delete this month only<\u002Fbutton>\n                <button onclick=\"{{ onDeleteFuture }}\" style=\"background: rgba(255,0,4,0.1); color: rgb(255,0,4); border: none; border-radius: 14px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;\">Delete this and future months<\u002Fbutton>\n                <span onclick=\"{{ onDeleteCancel }}\" style=\"text-align: center; color: rgba(0,0,0,0.45); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px;\">Cancel<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;skipLogin&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Behavior&quot;}}\">\n\nconst ICON_GLYPH = { bills:'checkbook', bank:'account_balance', card:'credit_card', living:'sentiment_satisfied', savings:'savings', income:'payments' };\nconst TOP_CATS = {\n  income:      { key:'income',       label:'Income',       color:'rgb(45,48,63)',   icon:'income' },\n  bills:       { key:'bills',        label:'Bills',        color:'rgb(147,129,27)', icon:'bills' },\n  creditcards: { key:'creditcards',  label:'Credit Cards', color:'rgb(67,96,234)',  icon:'card' },\n  living:      { key:'living',       label:'Living',       color:'rgb(84,38,26)',   icon:'living' },\n  savings:     { key:'savings',      label:'Savings',      color:'rgb(171,202,255)',icon:'savings' },\n};\nconst BILLS_LIKE = ['bills','creditcards','income'];\nconst PAY_LABELS = {\n  bills:{ planned:'Planned', paid:'Paid' },\n  creditcards:{ planned:'Planned', paid:'Paid' },\n  income:{ planned:'Planned', paid:'Received' },\n};\nconst LIVING_CATS = [\n  { key:'groceries',     label:'Groceries',     color:'rgb(195,162,171)', text:'rgb(0,0,0)' },\n  { key:'restaurants',   label:'Restaurants',   color:'rgb(211,194,0)',   text:'rgb(0,0,0)' },\n  { key:'takeout',       label:'Take Out',      color:'rgb(212,189,138)',text:'rgb(0,0,0)' },\n  { key:'dog',           label:'Dog',           color:'rgb(213,217,254)',text:'rgb(0,0,0)' },\n  { key:'household',     label:'Household',     color:'rgb(238,221,227)',text:'rgb(0,0,0)' },\n  { key:'personalcare',  label:'Personal Care', color:'rgb(144,95,95)',  text:'rgb(255,255,255)' },\n  { key:'entertainment', label:'Entertainment', color:'rgb(255,207,238)',text:'rgb(0,0,0)' },\n  { key:'travel',        label:'Travel',        color:'rgb(87,116,255)', text:'rgb(255,255,255)' },\n  { key:'car',           label:'Car',           color:'rgb(125,129,148)',text:'rgb(255,255,255)' },\n  { key:'misc',          label:'Misc',          color:'rgb(183,118,51)', text:'rgb(255,255,255)' },\n  { key:'therapy',       label:'Therapy',       color:'rgb(255,104,64)', text:'rgb(255,255,255)' },\n  { key:'medical',       label:'Medical',       color:'rgb(211,179,218)',text:'rgb(0,0,0)' },\n];\nconst LIVING_CAT_MAP = Object.fromEntries(LIVING_CATS.map(c => [c.key, c]));\nconst MONTH_MIN = -2, MONTH_MAX = 6;\nconst STORE_KEY = 'budgetapp_demo_v2_data';\n\nfunction uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }\nfunction pad2(n){ return String(n).padStart(2,'0'); }\nfunction monthKeyFromOffset(offset){\n  const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()+offset);\n  return d.getFullYear() + '-' + pad2(d.getMonth()+1);\n}\nfunction offsetFromMonthKey(monthKey){\n  const now = new Date(); const base = now.getFullYear()*12+now.getMonth();\n  const [y,m] = monthKey.split('-').map(Number);\n  return (y*12+(m-1)) - base;\n}\nfunction monthLabel(monthKey){\n  const [y,m] = monthKey.split('-').map(Number);\n  return new Date(y,m-1,1).toLocaleString('en-US',{month:'long'});\n}\nfunction daysInMonth(monthKey){\n  const [y,m] = monthKey.split('-').map(Number);\n  return new Date(y,m,0).getDate();\n}\nfunction dateForDay(monthKey, day){\n  const [y,m] = monthKey.split('-').map(Number);\n  const dim = daysInMonth(monthKey);\n  return y + '-' + pad2(m) + '-' + pad2(Math.min(day,dim));\n}\nfunction fmtDate(iso){\n  if(!iso) return '';\n  const [y,m,d] = iso.split('-').map(Number);\n  return m + '/' + d + '/' + String(y).slice(2);\n}\nlet __measureCanvas = null;\nfunction measureTextWidth(text, font){\n  if(!__measureCanvas) __measureCanvas = document.createElement('canvas');\n  const ctx = __measureCanvas.getContext('2d');\n  ctx.font = font;\n  return ctx.measureText(text).width;\n}\nfunction fmtMoney(n){\n  n = Number(n)||0;\n  const neg = n < 0; const v = Math.abs(n);\n  const hasCents = Math.round(v*100) % 100 !== 0;\n  const s = v.toLocaleString('en-US',{minimumFractionDigits:hasCents?2:0, maximumFractionDigits:2});\n  return (neg?'-':'') + '$' + s;\n}\nfunction rgbaTint(rgb, a){\n  const m = /rgb\\((\\d+),(\\d+),(\\d+)\\)/.exec(rgb);\n  return m ? 'rgba(' + m[1] + ',' + m[2] + ',' + m[3] + ',' + a + ')' : rgb;\n}\nfunction fmtMoneyRound(n){\n  n = Number(n)||0;\n  const neg = n < 0;\n  const v = Math.round(Math.abs(n));\n  return (neg?'-':'') + '$' + v.toLocaleString('en-US');\n}\nfunction todayISO(){\n  const d = new Date();\n  return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());\n}\n\nclass Component extends DCLogic {\n  state = {\n    booted: false,\n    loggedIn: true,\n    tab: 'today',\n    screen: 'today',\n    monthOffset: 0,\n    detailCat: null,\n    txFilter: null,\n    txFromSpending: false,\n    modal: null,\n    modalForm: null,\n    scopeDialog: null,\n    confirmDialog: null,\n  };\n\n  componentDidMount(){\n    let data = null;\n    try { const raw = localStorage.getItem(STORE_KEY); if(raw) data = JSON.parse(raw); } catch(e){}\n    if(!data || !data.items){ data = this.seedData(); this.persist(data); }\n    this.data = data;\n    this.setState({ booted: true });\n  }\n\n  persist(data){\n    try { localStorage.setItem(STORE_KEY, JSON.stringify(data || this.data)); } catch(e){}\n  }\n\n  seedData(){\n    const items = [];\n    const transactions = [];\n    const BILLS_SERIES = [\n      { name:'Rent', amount:1450, day:1 },\n      { name:'Renters Insurance', amount:22.45, day:15 },\n      { name:'Internet', amount:75, day:18 },\n      { name:'Phone Plan', amount:65, day:20 },\n    ];\n    const CC_SERIES = [\n      { name:'Visa', amount:180, day:11 },\n      { name:'Amex', amount:95, day:22 },\n      { name:'Discover', amount:60, day:27 },\n    ];\n    const INCOME_SERIES = [\n      { name:'Paycheck', amount:2000.00, day:1 },\n      { name:'Paycheck', amount:2000.00, day:15 },\n    ];\n    const LIVING_SERIES = {\n      groceries:450, restaurants:150, takeout:80, dog:60, household:120,\n      personalcare:70, entertainment:90, travel:100, car:140, misc:50, therapy:200, medical:40\n    };\n    // Demo is framed as \"end of month\" — the current month is fully elapsed and settled.\n    const todayDay = 31;\n\n    function pushSeries(type, series){\n      for(const s of series){\n        const seriesId = uid();\n        for(let off = MONTH_MIN; off <= MONTH_MAX; off++){\n          const monthKey = monthKeyFromOffset(off);\n          const date = dateForDay(monthKey, s.day);\n          let paid, status;\n          if(off < 0){ paid = true; status = 'actual'; }\n          else if(off === 0){ paid = s.day <= todayDay; status = paid ? 'actual' : 'estimate'; }\n          else { paid = false; status = 'estimate'; }\n          items.push({\n            id: uid(), type, seriesId, name: s.name, amount: s.amount, date, monthKey,\n            status, paymentStatus: paid ? 'paid' : 'planned',\n            includeInBudget: true, recurring: true,\n          });\n        }\n      }\n    }\n    pushSeries('bills', BILLS_SERIES);\n    pushSeries('creditcards', CC_SERIES);\n    pushSeries('income', INCOME_SERIES);\n\n    for(const cat of Object.keys(LIVING_SERIES)){\n      const seriesId = uid();\n      for(let off = MONTH_MIN; off <= MONTH_MAX; off++){\n        items.push({\n          id: uid(), type:'living', seriesId, name: LIVING_CAT_MAP[cat].label, amount: LIVING_SERIES[cat],\n          category: cat, monthKey: monthKeyFromOffset(off), recurring: true,\n        });\n      }\n    }\n    {\n      const seriesId = uid();\n      for(let off = MONTH_MIN; off <= MONTH_MAX; off++){\n        items.push({ id: uid(), type:'savings', seriesId, name:'Emergency Fund', amount: 400, monthKey: monthKeyFromOffset(off), recurring: true });\n      }\n    }\n\n    const SPEND_PLAN = {\n      groceries:   { pct:0.8,  rows:[['Whole Foods', 5]] },\n      restaurants: { pct:1.15, rows:[['Dinner Out', 8],['Brunch', 22]] },\n      takeout:     { pct:0.65, rows:[['Thai Takeout', 14]] },\n      dog:         { pct:0.9,  rows:[['Vet Visit', 6]] },\n      household:   { pct:0.5,  rows:[['Target Run', 10]] },\n      personalcare:{ pct:0.7,  rows:[['Haircut', 16]] },\n      entertainment:{pct:0.6,  rows:[['Movie Night', 19]] },\n      travel:      { pct:0,    rows:[] },\n      car:         { pct:0.75, rows:[['Gas', 12]] },\n      misc:        { pct:0.4,  rows:[['Amazon Order', 17]] },\n      therapy:     { pct:1.0,  rows:[['Therapy Session', 3]] },\n      medical:     { pct:0.3,  rows:[['Pharmacy', 25]] },\n    };\n    const accounts = ['BOA','Chase','Amex'];\n    let ai = 0;\n    for(let off = MONTH_MIN; off < 0; off++){\n      const monthKey = monthKeyFromOffset(off);\n      const decay = Math.max(0, 1 - 0.1*Math.abs(off));\n      for(const cat of Object.keys(SPEND_PLAN)){\n        const plan = SPEND_PLAN[cat];\n        if(!plan.rows.length) continue;\n        const budget = LIVING_SERIES[cat];\n        const targetTotal = budget * plan.pct * decay;\n        const weightSum = plan.rows.length;\n        plan.rows.forEach((row, i) => {\n          const amt = Math.round((targetTotal / weightSum) * 100) / 100;\n          transactions.push({\n            id: uid(), item: row[0], amount: amt, category: cat,\n            date: dateForDay(monthKey, row[1] + i), account: accounts[ai++ % accounts.length],\n            note: '', monthKey,\n          });\n        });\n      }\n    }\n\n    // curated transactions for the current month — framed as \"end of month\", so totals\n    // land close to (a realistic mix of slightly under/over) each category's budget\n    const CURRENT_TX = [\n      ['groceries','Whole Foods',108.20,2], ['groceries',\"Trader Joe's\",89.40,9], ['groceries','Farmers Market',41.15,16], ['groceries','Costco',142.60,23], ['groceries','Whole Foods',48.65,29],\n      ['restaurants','Dinner Out',42.50,5], ['restaurants','Brunch',38.00,13], ['restaurants','Sushi Night',64.75,21],\n      ['takeout','Thai Takeout',34.20,7], ['takeout','Pizza',37.80,25],\n      ['dog','Vet Visit',38.00,11], ['dog','Dog Food',17.25,24],\n      ['household','Target Run',64.10,4], ['household','Cleaning Supplies',26.35,19],\n      ['personalcare','Haircut',45.00,14], ['personalcare','Skincare Products',22.90,27],\n      ['entertainment','Streaming Subscriptions',15.99,1], ['entertainment','Concert Tickets',45.00,10], ['entertainment','Movie Night',24.50,22],\n      ['travel','Weekend Trip Gas',36.00,6], ['travel','Hotel Booking',59.00,18],\n      ['car','Gas',48.00,3], ['car','Car Wash',16.00,15], ['car','Oil Change',68.00,26],\n      ['misc','Amazon Order',18.99,8], ['misc','Birthday Gift',28.00,20],\n      ['therapy','Therapy Session',100.00,4], ['therapy','Therapy Session',100.00,18],\n      ['medical','Pharmacy',22.00,12], ['medical','Urgent Care Copay',35.00,28],\n    ];\n    {\n      const monthKey = monthKeyFromOffset(0);\n      CURRENT_TX.forEach(row => {\n        transactions.push({\n          id: uid(), item: row[1], amount: row[2], category: row[0],\n          date: dateForDay(monthKey, row[3]), account: accounts[ai++ % accounts.length],\n          note: '', monthKey,\n        });\n      });\n    }\n\n    return { items, transactions };\n  }\n\n  // ---------- computed helpers ----------\n  monthKey(off){ return monthKeyFromOffset(off === undefined ? this.state.monthOffset : off); }\n\n  itemsFor(type, monthKey){\n    return this.data.items.filter(i => i.type === type && i.monthKey === monthKey);\n  }\n  includedTotal(type, monthKey){\n    return this.itemsFor(type, monthKey).filter(i => i.includeInBudget !== false).reduce((s,i)=>s+Number(i.amount||0),0);\n  }\n  paidTotal(type, monthKey){\n    return this.itemsFor(type, monthKey).filter(i => i.includeInBudget !== false && i.paymentStatus === 'paid').reduce((s,i)=>s+Number(i.amount||0),0);\n  }\n  livingTotal(monthKey){\n    return this.itemsFor('living', monthKey).reduce((s,i)=>s+Number(i.amount||0),0);\n  }\n  savingsTotal(monthKey){\n    return this.itemsFor('savings', monthKey).reduce((s,i)=>s+Number(i.amount||0),0);\n  }\n  livingCatBudget(cat, monthKey){\n    return this.itemsFor('living', monthKey).filter(i=>i.category===cat).reduce((s,i)=>s+Number(i.amount||0),0);\n  }\n  livingCatSpent(cat, monthKey){\n    return this.data.transactions.filter(t=>t.monthKey===monthKey && t.category===cat).reduce((s,t)=>s+Number(t.amount||0),0);\n  }\n  transactionsFor(monthKey, cat){\n    return this.data.transactions\n      .filter(t => t.monthKey === monthKey && (!cat || t.category === cat))\n      .sort((a,b)=> a.date < b.date ? -1 : a.date > b.date ? 1 : 0);\n  }\n  sortedItems(type, monthKey){\n    return this.itemsFor(type, monthKey).slice().sort((a,b)=> (a.date||'') < (b.date||'') ? -1 : (a.date||'') > (b.date||'') ? 1 : 0);\n  }\n  sortedLivingItems(monthKey){\n    const order = LIVING_CATS.map(c=>c.key);\n    return this.itemsFor('living', monthKey).slice().sort((a,b)=> order.indexOf(a.category)-order.indexOf(b.category));\n  }\n\n  // ---------- navigation ----------\n  goTab(tab){ this.setState({ tab, screen: tab, txFilter:null, txFromSpending:false }); }\n  openBudgetDetail(catKey){\n    if(catKey === 'living') this.setState({ screen:'livingBudget' });\n    else if(catKey === 'savings') this.setState({ screen:'savingsDetail' });\n    else this.setState({ screen:'budgetDetail', detailCat: catKey });\n  }\n  openLivingSpending(){ this.setState({ screen:'livingSpending' }); }\n  backFromDetail(){\n    const s = this.state.screen;\n    if(s === 'livingSpending') this.setState({ screen:'livingBudget' });\n    else this.setState({ screen:'budgets', tab:'budgets' });\n  }\n  openTransactionsFromSpending(cat){ this.setState({ screen:'transactions', tab:'transactions', txFilter: cat, txFromSpending: true }); }\n  backFromTransactions(){ this.setState({ screen:'livingSpending', txFilter:null, txFromSpending:false }); }\n  changeMonth(off){ if(off>=MONTH_MIN && off<=MONTH_MAX) this.setState({ monthOffset: off }, () => this._centerMonthBar(true)); }\n  _centerMonthBar(smooth){\n    const el = this._monthBarEl;\n    if(!el) return;\n    requestAnimationFrame(() => {\n      const child = el.querySelector('[data-offset=\"' + this.state.monthOffset + '\"]');\n      if(!child) return;\n      const target = child.offsetLeft + child.offsetWidth/2 - el.clientWidth/2;\n      if(smooth) el.scrollTo({ left: target, behavior: 'smooth' });\n      else el.scrollLeft = target;\n    });\n  }\n  onMonthBarScroll(){\n    const el = this._monthBarEl;\n    if(!el) return;\n    clearTimeout(this._scrollSnapTimer);\n    this._scrollSnapTimer = setTimeout(() => {\n      const center = el.scrollLeft + el.clientWidth/2;\n      let best = null, bestDist = Infinity;\n      el.querySelectorAll('[data-offset]').forEach(child => {\n        const mid = child.offsetLeft + child.offsetWidth/2;\n        const dist = Math.abs(mid - center);\n        if(dist < bestDist){ bestDist = dist; best = Number(child.getAttribute('data-offset')); }\n      });\n      if(best !== null && best !== this.state.monthOffset){\n        this.setState({ monthOffset: best }, () => this._centerMonthBar(true));\n      } else {\n        this._centerMonthBar(true);\n      }\n    }, 100);\n  }\n\n  // ---------- modal ----------\n  openAdd(type, extra){\n    const monthKey = this.monthKey();\n    let form = { type, name:'', amount:0, date: todayISO(), category:'', account:'', note:'',\n      status:'estimate', paymentStatus:'planned', includeInBudget:true, recurring:true, monthKey };\n    if(extra) Object.assign(form, extra);\n    this.setState({ modal:'add', modalForm: form });\n  }\n  openEdit(item){\n    this.setState({ modal:'edit', modalForm: Object.assign({}, item) });\n  }\n  openTxAdd(){\n    this.setState({ modal:'addTx', modalForm:{ type:'transaction', item:'', amount:0, category:'', date: todayISO(), account:'', note:'', monthKey: this.monthKey() } });\n  }\n  openTxEdit(tx){ this.setState({ modal:'editTx', modalForm: Object.assign({}, tx) }); }\n  closeModal(){ this.setState({ modal:null, modalForm:null }); }\n  setForm(patch){ this.setState(s => ({ modalForm: Object.assign({}, s.modalForm, patch) })); }\n\n  validate(form){\n    const errors = {};\n    if(form.type !== 'transaction' && form.type !== 'savings' && !form.name) errors.name = 'Required';\n    if(form.type === 'savings' && !form.name) errors.name = 'Required';\n    if((form.type === 'living' || form.type === 'transaction') && !form.category) errors.category = 'Required';\n    return errors;\n  }\n\n  saveModal(){\n    const form = this.state.modalForm;\n    const errors = this.validate(form);\n    if(Object.keys(errors).length){ this.setState({ formErrors: errors }); return; }\n    this.setState({ formErrors: null });\n\n    if(this.state.modal === 'addTx'){\n      this.data.transactions.push(Object.assign({ id: uid() }, form));\n      this.persist(); this.closeModal(); return;\n    }\n    if(this.state.modal === 'editTx'){\n      const idx = this.data.transactions.findIndex(t=>t.id===form.id);\n      if(idx>-1) this.data.transactions[idx] = Object.assign({}, form);\n      this.persist(); this.closeModal(); return;\n    }\n    if(this.state.modal === 'add'){\n      const item = Object.assign({ id: uid(), seriesId: form.recurring ? uid() : null }, form);\n      this.data.items.push(item);\n      if(form.recurring){\n        const startOff = offsetFromMonthKey(form.monthKey);\n        for(let off = startOff+1; off <= MONTH_MAX; off++){\n          const mk = monthKeyFromOffset(off);\n          const inst = Object.assign({}, item, { id: uid(), monthKey: mk });\n          if(item.date) inst.date = dateForDay(mk, Number(item.date.split('-')[2]));\n          inst.paymentStatus = 'planned'; inst.status = 'estimate';\n          this.data.items.push(inst);\n        }\n      }\n      this.persist(); this.closeModal(); return;\n    }\n    if(this.state.modal === 'edit'){\n      const original = this.data.items.find(i=>i.id===form.id);\n      const wasRecurring = original.recurring;\n      const stillRecur
